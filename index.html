<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乘數表 Time Attack 翻牌遊戲</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        #info-panel {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #timer { color: #e74c3c; }
        #score { color: #2ecc71; }

        /* 4x4 卡牌網格 */
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
            perspective: 1000px; /* 3D 翻牌效果 */
        }

        .card {
            height: 100px;
            background-color: #34495e;
            color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.6s, background-color 0.3s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 翻開後的樣式 */
        .card.flipped {
            background-color: #ffffff;
            color: #2c3e50;
            transform: rotateY(180deg);
            border: 2px solid #3498db;
        }

        /* 成功配對後的樣式 */
        .card.matched {
            background-color: #2ecc71;
            color: white;
            cursor: default;
            transform: rotateY(180deg);
            border: 2px solid #27ae60;
        }

        /* 按鈕樣式 */
        button {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1.1rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>⏱️ 乘數表 Time Attack!</h1>
    
    <div id="info-panel">
        <div id="timer">時間: 0.0s</div>
        <div id="score">配對: 0 / 8</div>
    </div>

    <div id="game-board"></div>

    <button id="restart-btn" onclick="initGame()">刷新組合 / school開始</button>

    <script>
        const board = document.getElementById('game-board');
        const timerDisplay = document.getElementById('timer');
        const scoreDisplay = document.getElementById('score');
        
        let cardsData = [];
        let flippedCards = [];
        let matchedCount = 0;
        let startTime;
        let timerInterval;
        let isPlaying = false;

        // 1. 隨機生成 10 以內的乘數組合 (需要 8 組，共 16 張卡)
        function generateMathPairs() {
            let pairs = [];
            let usedPool = new Set();

            while (pairs.length < 8) {
                let a = Math.floor(Math.random() * 9) + 2; // 2-10
                let b = Math.floor(Math.random() * 9) + 2; // 2-10
                let formula = `${a} × ${b}`;
                let answer = (a * b).toString();

                // 避免重複出現同一個算式
                if (!usedPool.has(formula)) {
                    usedPool.add(formula);
                    
                    // 配對物件：一邊係題目，一邊係答案，但擁有相同嘅 id
                    let id = pairs.length;
                    pairs.push({ id: id, text: formula, type: 'q' });
                    pairs.push({ id: id, text: answer, type: 'a' });
                }
            }
            // 洗牌 (Shuffle)
            return pairs.sort(() => Math.random() - 0.5);
        }

        // 2. 初始化遊戲
        function initGame() {
            // 清除計時器
            clearInterval(timerInterval);
            isPlaying = false;
            timerDisplay.textContent = "時間: 0.0s";
            
            matchedCount = 0;
            scoreDisplay.textContent = `配對: ${matchedCount} / 8`;
            flippedCards = [];
            board.innerHTML = '';

            // 產生新卡牌
            cardsData = generateMathPairs();

            // 渲染畫面上嘅卡牌
            cardsData.forEach((data, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.index = index;
                card.textContent = data.text; // 隱藏在 CSS 裹，翻開才看到
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        // 3. 翻牌邏輯
        function flipCard() {
            const cardIndex = this.dataset.index;
            const selectedCard = cardsData[cardIndex];

            // 防止重複點擊已翻開、已配對嘅卡，或同時翻開多過兩張
            if (this.classList.contains('flipped') || this.classList.contains('matched') || flippedCards.length >= 2) {
                return;
            }

            // 第一吓點擊時開始計時 (Time Attack)
            if (!isPlaying) {
                isPlaying = true;
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    let elapsedTime = ((Date.now() - startTime) / 1000).toFixed(1);
                    timerDisplay.textContent = `時間: ${elapsedTime}s`;
                }, 100);
            }

            // 翻牌效果
            this.classList.add('flipped');
            flippedCards.push({ element: this, data: selectedCard });

            // 當翻開咗兩張牌，檢查係咪配對
            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        // 4. 檢查配對
        function checkMatch() {
            const [card1, card2] = flippedCards;

            // 檢查 ID 係咪一樣（即係屬於同一個乘數組合）
            if (card1.data.id === card2.data.id) {
                // 配對成功
                setTimeout(() => {
                    card1.element.classList.add('matched');
                    card2.element.classList.add('matched');
                    matchedCount++;
                    scoreDisplay.textContent = `配對: ${matchedCount} / 8`;
                    flippedCards = [];

                    // 勝利判定
                    if (matchedCount === 8) {
                        clearInterval(timerInterval);
                        let finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
                        alert(`🎉 恭喜完成！總共用咗 ${finalTime} 秒！`);
                    }
                }, 400);
            } else {
                // 配對失敗，0.8秒後翻返轉
                setTimeout(() => {
                    card1.element.classList.remove('flipped');
                    card2.element.classList.remove('flipped');
                    flippedCards = [];
                }, 800);
            }
        }

        // 網頁載入後自動開始
        window.onload = initGame;
    </script>
</body>
</html>
